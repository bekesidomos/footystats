<div class="auth-container">
  <mat-card class="auth-card mat-elevation-z4">
    <mat-card-header>
      <mat-card-title>{{ loginMode ? 'Login' : 'Register' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="name@example.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Please enter a valid email
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Password must be at least 6 characters
          </mat-error>
        </mat-form-field>

        <button 
          mat-flat-button 
          color="primary" 
          type="submit" 
          [disabled]="loginForm.invalid"
          class="submit-btn">
          {{ loginMode ? 'Login' : 'Register' }}
        </button>

      </form>
    </mat-card-content>
    
    <mat-card-actions>
      <p>
        {{ loginMode ? "Don't have an account?" : "Already have an account?" }}
        <button mat-button color="accent" (click)="toggleMode()">
          {{ loginMode ? 'Register here' : 'Login here' }}
        </button>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
